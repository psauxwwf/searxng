services:
  mcp-searxng:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SEARXNG_VERSION: ${SEARXNG_VERSION:-2026.5.31-7159b8aed}
        MCP_SEARXNG_VERSION: ${MCP_SEARXNG_VERSION:-latest}
      cache_from:
        - type=registry,ref=ghcr.io/psauxwwf/searxng:latest
      cache_to:
        - type=inline
    image: ghcr.io/psauxwwf/searxng:latest
    container_name: mcp-searxng
    init: true
    environment:
      - MCP_HTTP_PORT=3000
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_ALLOW_PRIVATE_URLS=false
      - MCP_HTTP_EXPOSE_FULL_CONFIG=false
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:3000/health'', timeout=5).read(1)"',
        ]
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    network_mode: "host"
