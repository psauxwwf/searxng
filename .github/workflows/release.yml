name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "searxng version (e.g. 2026.5.31-7159b8aed)"
        required: true
        default: "2026.5.31-7159b8aed"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          echo "SEARXNG_VERSION=${{ inputs.version }}" > .env
          echo "MCP_SEARXNG_VERSION=latest" >> .env

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - run: task build

      - run: |
          docker image tag ghcr.io/psauxwwf/searxng:latest \
            ghcr.io/psauxwwf/searxng:${{ inputs.version }}
          docker push ghcr.io/psauxwwf/searxng:latest
          docker push ghcr.io/psauxwwf/searxng:${{ inputs.version }}

      - uses: softprops/action-gh-release@v2
        with:
          target_commitish: ${{ github.sha }}
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: "searxng ${{ inputs.version }}"
