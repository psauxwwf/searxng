http:
  middlewares:
    mcp-security:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: no-referrer
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          Permissions-Policy: interest-cohort=()

    mcp-ratelimit:
      rateLimit:
        average: 30
        burst: 60
